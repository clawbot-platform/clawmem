name: ci

on:
  push:
  pull_request:

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
