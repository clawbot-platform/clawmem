name: publish-image

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example drq-v1-baseline-20260329
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo '${{ inputs.release_tag }}')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/clawmem.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/clawbot-platform/clawmem:sha-${{ steps.meta.outputs.short_sha }}
            ghcr.io/clawbot-platform/clawmem:${{ inputs.release_tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          labels: |
            org.opencontainers.image.source=https://github.com/clawbot-platform/clawmem
            org.opencontainers.image.description=Reusable Go-first memory, replay, and historical context service.
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.release_tag }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
